<html lang="fr">
<head>
<meta charset="utf-8">

<title>RDR Freeparty Stand</title>
<style>
:root {
  --bg:#0b0d10; --bg2:#12161b; --surface:#171c22; --surface-2:#1f2630; --card:#14191f;
  --text:#f6f7f9; --muted:#b7c0ca; --soft:#d8dee6; --line:#2c3440;
  --safe:#57ff8a; --cyan:#31d9ff; --warning:#ffb020; --danger:#ff4d4d; --peer:#8fb3ff;
  --r:14px; --touch:48px;
}
* { box-sizing:border-box; }
html { background:var(--bg); color-scheme:dark; }
body {
  margin:0; color:var(--text); font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; line-height:1.58;
  background:linear-gradient(180deg,var(--bg),#090b0e 56%,#050607);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body:before {
  content:none;
}
button,input { font:inherit; }
button,a { -webkit-tap-highlight-color:transparent; }
.app { max-width:980px; margin:0 auto; padding:14px 14px 132px; position:relative; }
.top {
  position:sticky; top:0; z-index:20; background:rgba(11,13,16,.94); backdrop-filter:blur(14px);
  border:1px solid var(--line); border-top:0; border-radius:0 0 16px 16px; margin:0 -6px 18px; padding:10px;
  display:flex; gap:10px; align-items:center; justify-content:space-between; box-shadow:0 12px 30px rgba(0,0,0,.32);
}
.brand { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:.04em; text-transform:uppercase; font-size:.82rem; }
.brand-dot { width:18px; height:18px; border-radius:50%; border:2px solid rgba(255,255,255,.82); padding:0; cursor:pointer; background:var(--danger); box-shadow:0 0 0 4px rgba(255,77,77,.14); }
.staff-chip { border:1px solid rgba(255,77,77,.46); background:rgba(255,77,77,.12); color:#ffe1e1; border-radius:999px; padding:8px 10px; font-size:.72rem; font-weight:900; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; }
.langs { display:flex; gap:7px; flex-wrap:wrap; }
.langs button,.back,.chip { min-height:var(--touch); border:1px solid var(--line); background:var(--surface); color:var(--text); border-radius:999px; padding:10px 14px; cursor:pointer; }
.langs button.active,.chip.active { background:var(--safe); color:#06110a; border-color:transparent; font-weight:900; }
.langs button:focus-visible,.back:focus-visible,.chip:focus-visible,.tile:focus-visible,.btn:focus-visible,.sos-primary:focus-visible,.sos-secondary:focus-visible { outline:3px solid var(--cyan); outline-offset:3px; }
.screen { display:none; }
.screen.active { display:block; }
h1 { font-size:clamp(2.45rem,9vw,4.8rem); line-height:.94; margin:22px 0 14px; letter-spacing:0; text-transform:uppercase; text-wrap:balance; }
h1:after { content:""; display:block; width:min(320px,74vw); height:4px; margin-top:16px; border-radius:999px; background:linear-gradient(90deg,var(--safe),var(--cyan)); }
h2 { font-size:clamp(1.65rem,6vw,2.5rem); line-height:1.06; margin:26px 0 12px; letter-spacing:0; text-transform:none; text-wrap:balance; }
h3 { font-size:1.18rem; line-height:1.2; margin:20px 0 8px; }
p { color:var(--muted); margin:0 0 14px; }
.lead { font-size:1.06rem; line-height:1.62; max-width:760px; color:var(--soft); }
.kicker,.hero-label { display:inline-flex; align-items:center; min-height:32px; font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:#06110a; font-weight:950; background:var(--safe); padding:7px 10px; border-radius:999px; }
.home-columns { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:20px 0; }
.col { display:flex; flex-direction:column; gap:14px; }
.tile,.btn {
  width:100%; min-height:104px; border:1px solid var(--line);
  background:linear-gradient(180deg,var(--surface-2),var(--card));
  color:var(--text); border-radius:var(--r); padding:18px; text-align:left; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:0 10px 26px rgba(0,0,0,.25);
}
.tile:before,.btn:before { content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--safe); }
.tile strong,.btn strong { display:block; font-size:clamp(1.18rem,3.8vw,1.7rem); line-height:1.15; margin-bottom:7px; }
.tile span,.btn span { color:var(--muted); font-size:.96rem; line-height:1.45; }
.tile-priority { min-height:136px; border-color:rgba(255,176,32,.62); background:linear-gradient(180deg,#2b2112,var(--card)); }
.tile-priority:before { background:var(--warning); }
.tile-priority strong { font-size:clamp(1.85rem,8vw,3.2rem); line-height:1; }
.hero-label { margin-bottom:12px; background:var(--warning); color:#160d00; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin:20px 0; }
.detail,.question { background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin:16px 0; box-shadow:0 12px 30px rgba(0,0,0,.26); }
.search { width:100%; min-height:54px; border:1px solid #3a4552; background:#0f1318; color:var(--text); border-radius:14px; padding:15px 16px; margin:16px 0; outline:none; }
.search:focus { border-color:var(--safe); box-shadow:0 0 0 3px rgba(87,255,138,.16); }
ul { padding-left:20px; margin:10px 0 0; }
li { margin:10px 0; color:var(--text); padding-left:2px; }
.section-title { margin:0 0 9px; color:var(--soft); font-weight:950; text-transform:uppercase; letter-spacing:.08em; font-size:.76rem; }
.after-title { color:#06110a!important; background:var(--safe); border:0!important; display:inline-flex; padding:8px 12px!important; border-radius:999px; margin-top:22px!important; }
.note,.supportbox,.warningbox,.peerbox { border:1px solid var(--line); border-left-width:5px; border-radius:12px; padding:14px; margin:14px 0; color:var(--text); background:#11161c; }
.note { border-left-color:var(--safe); }
.warningbox { border-left-color:var(--warning); background:#1f190f; }
.supportbox { border-left-color:var(--danger); background:#201315; }
.peerbox { border-left-color:var(--peer); background:#121827; }
.synthesis { display:grid; gap:10px; margin:14px 0; }
.synth-row { display:grid; grid-template-columns:104px 1fr; gap:10px; align-items:start; border:1px solid var(--line); border-radius:12px; padding:12px; background:#10151b; }
.synth-label { color:var(--safe); font-size:.74rem; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
.synth-text { color:var(--text); line-height:1.45; }
.danger-btn { border-color:rgba(255,77,77,.58); background:linear-gradient(180deg,#2a1719,var(--card)); }
.danger-btn:before { background:var(--danger); }
.danger-btn strong { color:#ffe7e7; }
.answers { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
a { color:var(--safe); text-underline-offset:3px; }
.image-wrap { width:100%; overflow:auto; border:1px solid var(--line); border-radius:22px; background:#000; padding:10px; }
.combo-img { display:block; width:100%; min-width:1180px; height:auto; border-radius:14px; }
.prevention-img { display:block; max-width:100%; width:min(720px,100%); height:auto; margin:0 auto; border-radius:14px; background:#fff; }
.tripsit-main-card { border-color:rgba(87,255,138,.36); }
.interactions-tripsit-wrap { max-height:62vh; margin-top:18px; }
.breath-card { text-align:center; }
.breath-stage { font-size:clamp(2rem,8vw,3.9rem); font-weight:950; text-transform:uppercase; letter-spacing:0; margin:10px 0 20px; }
.breath-box { width:min(280px,72vw); height:min(280px,72vw); border:3px solid rgba(87,255,138,.78); border-radius:20px; margin:0 auto 18px; position:relative; }
.breath-dot { width:28px; height:28px; border-radius:50%; background:var(--safe); box-shadow:0 0 20px rgba(87,255,138,.44); position:absolute; left:-14px; top:-14px; animation:boxBreath 16s linear infinite; }
@keyframes boxBreath { 0%{left:-14px;top:-14px} 25%{left:calc(100% - 14px);top:-14px} 50%{left:calc(100% - 14px);top:calc(100% - 14px)} 75%{left:-14px;top:calc(100% - 14px)} 100%{left:-14px;top:-14px} }
.breath-count { font-size:3.3rem; font-weight:950; color:var(--safe); }
.bilingual-q strong em { display:block; margin-left:0; margin-top:6px; }
em.fr { color:var(--muted); font-style:italic; margin-left:6px; font-size:.92em; }
.yesno .chip { min-width:120px; text-align:center; }
.sos-dock { position:fixed; left:10px; right:10px; bottom:10px; max-width:980px; margin:0 auto; z-index:25; display:grid; grid-template-columns:1fr auto auto auto; gap:8px; align-items:center; background:rgba(7,9,11,.94); backdrop-filter:blur(16px); border:1px solid #343d48; border-radius:18px; padding:8px; box-shadow:0 14px 38px rgba(0,0,0,.52); }
.sos-dock span { display:block; color:var(--muted); font-size:.82rem; line-height:1.25; padding-left:6px; }
.sos-primary,.sos-secondary { min-height:var(--touch); display:inline-flex; align-items:center; justify-content:center; border-radius:12px; padding:0 14px; font-weight:950; text-decoration:none; white-space:nowrap; }
.sos-primary { background:var(--danger); color:#fff; }
.sos-secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
.small { font-size:.86rem; color:var(--muted); }
@media(max-width:850px) {
  .home-columns,.grid { grid-template-columns:1fr; }
  .tile-priority { min-height:130px; }
  .yesno .chip { min-width:100%; text-align:left; }
  em.fr { display:block; margin-left:0; margin-top:4px; }
}
@media(max-width:520px) {
  .app { padding-inline:12px; padding-bottom:154px; }
  .top { align-items:flex-start; }
  .brand { flex-wrap:wrap; }
  .langs { justify-content:flex-end; }
  .langs button { min-width:48px; padding-inline:10px; }
  .tile,.btn,.detail,.question { padding:16px; }
  .synth-row { grid-template-columns:1fr; gap:5px; }
  .sos-dock { grid-template-columns:1fr 72px 44px 44px; border-radius:16px; }
  .sos-dock span { font-size:.76rem; }
  .sos-primary,.sos-secondary { padding-inline:8px; }
}
@media(prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:.01ms!important; animation-iteration-count:1!important; scroll-behavior:auto!important; }
}
</style>

function breathing() {
  const stages = {
    fr:["Inspire","Bloque","Expire","Bloque"],
    en:["Breathe in","Hold","Breathe out","Hold"],
    es:["Inhala","Mantén","Exhala","Mantén"],
    it:["Inspira","Trattieni","Espira","Trattieni"]
  }[lang] || ["Inspire","Bloque","Expire","Bloque"];
  screen("breathing");
  let phase = 0;
  let count = 4;
  clearInterval(breathTimer);
  const tick = () => {
    setText("breathStage", stages[phase]);
    setText("breathCount", String(count));
    count -= 1;
    if (count < 1) {
      count = 4;
      phase = (phase + 1) % 4;
    }
  };
  tick();
  breathTimer = setInterval(tick, 1000);
}

  setText("publicBadTitle", T("publicBadTitle"));
  setText("publicBadLead", T("publicBadLead"));
  setText("publicBadIntro", T("publicBadIntro"));
  const box = $("publicBadQuestions");
  box.innerHTML = T("pbQ").map((question, idx) => `
    <div class="question bilingual-q">
      <strong>${question} <em class="fr">${T("frQ")[idx]}</em></strong>
      <div class="answers yesno">
        <button class="chip">${T("publicYes")} <em class="fr">Oui</em></button>
        <button class="chip">${T("publicNo")} <em class="fr">Non</em></button>
        <button class="chip">${T("publicDK")} <em class="fr">Je ne sais pas</em></button>
      </div>
    </div>
  `).join("") + `<div class="supportbox">112 si respiration bizarre, inconscience, convulsions, douleur thoracique ou mise en danger. Rester avec la personne.</div>`;
  screen("publicBadtrip");
}

function handleClick(e) {
  const el = e.target.closest("[data-action],[data-list],[data-detail],[data-choose],[data-lang]");
  if (!el) return;
  const langCode = el.getAttribute("data-lang") || el.getAttribute("data-choose");
  if (langCode) { choose(langCode); return; }
  const listCat = el.getAttribute("data-list");
  if (listCat) { showList(listCat); return; }
  const detailId = el.getAttribute("data-detail");
  if (detailId) { showDetail(detailId, el.getAttribute("data-from") || "list"); return; }
  const action = el.getAttribute("data-action");
  const actions = { home:()=>screen("home"), backDetail: backFromDetail, interactions, prevention, breathing, staff, publicBadtrip };
  if (actions[action]) actions[action]();
}

document.addEventListener("click", handleClick);
const searchInput = $("search");
if (searchInput) searchInput.addEventListener("input", renderList);
setLang(lang);
</script>
</body>
</html>
